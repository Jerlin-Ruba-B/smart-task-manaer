version: "3.8"

services:
  backend:
    build: .
    container_name: smart-task-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
    depends_on:
      - mongo
    restart: always

  mongo:
    image: mongo
    container_name: smart-task-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: always

volumes:
  mongo-data:version: "3"

services:
  backend:
    image: smart-task-manager-backend
    ports:
      - "5000:5000"
    env_file:
      - .env
